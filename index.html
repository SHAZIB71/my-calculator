<!DOCTYPE html>
<html>
<head>
    <title>Smart History Calculator</title>
    <style>
        body { 
            background: #1a1a2e; font-family: sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; color: white;
        }
        .main-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        /* Calculator Styling */
        .calculator { 
            background: #16213e; padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; 
        }
        input { 
            width: 100%; height: 60px; font-size: 24px; text-align: right; 
            margin-bottom: 15px; border-radius: 8px; border: none; padding: 10px;
            background: #0f3460; color: #e94560; box-sizing: border-box;
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { 
            padding: 15px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none;
            background: #533483; color: white; transition: 0.2s;
        }
        button:hover { background: #e94560; }
        .btn-eq { background: #22c55e; grid-column: span 2; }
        .btn-c { background: #e94560; }

        /* History Styling */
        .history-panel { 
            background: #16213e; padding: 20px; border-radius: 15px; 
            width: 250px; max-height: 400px; overflow-y: auto; 
        }
        .history-item { 
            background: #0f3460; padding: 10px; margin-bottom: 8px; 
            border-radius: 5px; font-size: 14px; border-left: 4px solid #e94560;
        }
        h3 { margin-top: 0; color: #94a3b8; }
    </style>
</head>
<body>

    <h2>Calculations with History</h2>

    <div class="main-container">
        <div class="calculator">
            <input type="text" id="result" readonly placeholder="0">
            <div class="grid">
                <button class="btn-c" onclick="clearScr()">C</button>
                <button onclick="backspace()">⌫</button>
                <button onclick="add('/')">/</button>
                <button onclick="add('*')">×</button>

                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button onclick="add('-')">-</button>

                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>
                <button onclick="add('+')">+</button>

                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>
                <button onclick="add('0')">0</button>

                <button class="btn-eq" onclick="solve()">=</button>
                <button onclick="add('.')">.</button>
            </div>
        </div>

        <div class="history-panel">
            <h3>History</h3>
            <div id="hist-list">
                <p style="font-size: 12px; color: #64748b;">No history yet</p>
            </div>
            <button style="width:100%; font-size: 12px; padding: 5px; margin-top: 10px;" onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
        const screen = document.getElementById('result');
        const histDiv = document.getElementById('hist-list');

        function add(v) { screen.value += v; }
        function clearScr() { screen.value = ""; }
        function backspace() { screen.value = screen.value.slice(0, -1); }

        function solve() {
            try {
                let expression = screen.value;
                let ans = eval(expression);
                
                // History mein save karna
                if (expression != "") {
                    let newItem = document.createElement('div');
                    newItem.className = 'history-item';
                    newItem.innerHTML = `${expression} = <b>${ans}</b>`;
                    
                    // Agar "No history yet" likha hai toh use mita dein
                    if(histDiv.firstChild.tagName === 'P') histDiv.innerHTML = "";
                    
                    histDiv.insertBefore(newItem, histDiv.firstChild);
                }
                
                screen.value = ans;
            } catch {
                screen.value = "Error";
            }
        }

        function clearHistory() {
            histDiv.innerHTML = '<p style="font-size: 12px; color: #64748b;">No history yet</p>';
        }
    </script>

</body>
</html>
