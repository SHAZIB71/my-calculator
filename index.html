<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Smart Calculator</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #0f172a; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: white; }
        .main-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        
        /* Calculator Design */
        .calc-card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        #display { width: 100%; height: 60px; background: #0f172a; border: none; color: #38bdf8; font-size: 1.8rem; text-align: right; padding: 10px; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; background: #334155; color: white; }
        button:hover { background: #475569; }
        .btn-op { background: #f59e0b; }
        .btn-clear { background: #ef4444; }
        .btn-equal { background: #10b981; grid-column: span 2; }

        /* History Design */
        .history-card { background: #1e293b; padding: 15px; border-radius: 20px; width: 280px; max-height: 400px; display: flex; flex-direction: column; }
        #hist-list { overflow-y: auto; flex-grow: 1; }
        .history-item { background: #0f172a; padding: 8px; border-radius: 5px; margin-bottom: 8px; font-size: 0.9rem; border-left: 3px solid #38bdf8; }
        .history-item b { color: #38bdf8; }
    </style>
</head>
<body>

    <h2>Smart Calculator v3.0</h2>

    <div class="main-container">
        <div class="calc-card">
            <input type="text" id="display" readonly placeholder="0">
            <div class="grid">
                <button class="btn-clear" onclick="clearScr()">C</button>
                <button onclick="back()">&larr;</button>
                <button class="btn-op" onclick="add('/')">/</button>
                <button class="btn-op" onclick="add('*')">×</button>
                <button onclick="add('7')">7</button>
                <button onclick="add('8')">8</button>
                <button onclick="add('9')">9</button>
                <button class="btn-op" onclick="add('-')">-</button>
                <button onclick="add('4')">4</button>
                <button onclick="add('5')">5</button>
                <button onclick="add('6')">6</button>
                <button class="btn-op" onclick="add('+')">+</button>
                <button onclick="add('1')">1</button>
                <button onclick="add('2')">2</button>
                <button onclick="add('3')">3</button>
                <button onclick="add('.')">.</button>
                <button onclick="add('0')">0</button>
                <button class="btn-equal" onclick="solve()">=</button>
            </div>
        </div>

        <div class="history-card">
            <h3 style="margin-top:0">History <button onclick="clearHistory()" style="font-size:10px; height:20px; padding:0 5px;">Clear</button></h3>
            <div id="hist-list"></div>
        </div>
    </div>

    <script>
        const disp = document.getElementById('display');
        const histList = document.getElementById('hist-list');

        // Page load hote hi history wapas lana
        window.onload = function() {
            const saved = localStorage.getItem('myCalcData');
            if (saved) { histList.innerHTML = saved; }
        };

        function add(v) { 
            if(disp.value === "Error") disp.value = "";
            disp.value += v; 
        }

        function clearScr() { disp.value = ""; }
        function back() { disp.value = disp.value.slice(0, -1); }

        function solve() {
            try {
                let exp = disp.value;
                if(exp === "") return;
                let res = eval(exp);
                
                // History mein dikhana
                let item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `${exp} = <b>${res}</b>`;
                histList.insertBefore(item, histList.firstChild);
                
                // Memory mein hamesha ke liye save karna
                localStorage.setItem('myCalcData', histList.innerHTML);
                
                disp.value = res;
            } catch {
                disp.value = "Error";
            }
        }

        function clearHistory() {
            histList.innerHTML = "";
            localStorage.removeItem('myCalcData');
        }
    </script>
</body>
</html>
