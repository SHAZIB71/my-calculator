<!DOCTYPE html>
<html>
<head>
    <title>Pro Calculator</title>
    <style>
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .calc-card { background: #16213e; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 320px; }
        
        #display { 
            width: 100%; height: 70px; background: #0f3460; border: none; 
            color: #e94560; font-size: 2.5rem; text-align: right; 
            padding: 10px; box-sizing: border-box; border-radius: 10px; margin-bottom: 20px;
            outline: none; font-weight: bold;
        }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

        button { 
            height: 60px; border: none; border-radius: 12px; font-size: 1.4rem; 
            font-weight: bold; cursor: pointer; transition: 0.2s; background: #533483; color: white;
        }

        button:hover { transform: translateY(-3px); filter: brightness(1.2); }
        button:active { transform: translateY(0); }

        /* Alag-alag colors ke liye classes */
        .btn-red { background: #e94560; }   /* Clear button */
        .btn-orange { background: #f97316; } /* Operations */
        .btn-green { background: #22c55e; grid-column: span 2; } /* Equal button */
    </style>
</head>
<body>

<div class="calc-card">
    <input type="text" id="display" readonly placeholder="0">
    
    <div class="grid">
        <button class="btn-red" onclick="clearScr()">C</button>
        <button onclick="backspace()">⌫</button>
        <button class="btn-orange" onclick="add('/')">÷</button>
        <button class="btn-orange" onclick="add('*')">×</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button class="btn-orange" onclick="add('-')">−</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button class="btn-orange" onclick="add('+')">+</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('.')">.</button>

        <button onclick="add('0')">0</button>
        <button class="btn-green" onclick="solve()">=</button>
    </div>
</div>

<script>
    const disp = document.getElementById('display');

    function add(v) { 
        if(disp.value === "Error") disp.value = "";
        disp.value += v; 
    }

    function clearScr() { disp.value = ""; }

    function backspace() { disp.value = disp.value.slice(0, -1); }

    function solve() {
        try {
            // eval math string ko solve karta hai
            disp.value = eval(disp.value);
        } catch(e) {
            disp.value = "Error";
            setTimeout(clearScr, 1500); // 1.5 sec baad screen saaf
        }
    }
</script>

</body>
</html>
